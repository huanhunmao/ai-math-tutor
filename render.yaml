services:
  - type: web
    name: ai-math-tutor-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: OPENAI_MODEL
        value: moonshot-v1-8k
      - key: RAG_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-math-tutor-db
          property: connectionString
databases:
  - name: ai-math-tutor-db
    plan: free
